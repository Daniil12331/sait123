{% extends "base.html" %}
{% block title %}Вход - Учусь.РФ{% endblock %}

{% block content %}
<div class="auth-form">
    <div class="auth-card">
        <h1>Вход в систему</h1>
        <p class="auth-subtitle">Войдите, чтобы продолжить</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" class="form-control" required placeholder="Введите логин">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Введите пароль">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Войти</button>
        </form>

        <div class="auth-footer">
            <p>Ещё не зарегистрированы? <a href="{{ url_for('register') }}">Регистрация</a></p>
        </div>
    </div>
</div>
{% endblock %}
